<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Sheet | D&D Sheet Hub</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ---- EMPTY STATE ---- */
      .empty-state {
        text-align: center;
        padding: 80px 20px;
      }

      .empty-icon {
        font-size: 52px;
        display: block;
        margin-bottom: 20px;
        opacity: 0.4;
      }

      .empty-title {
        font-family: "Cinzel", serif;
        font-size: 18px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #5a4a30;
        margin-bottom: 10px;
      }

      .empty-desc {
        font-family: "Crimson Pro", serif;
        font-style: italic;
        font-size: 16px;
        color: #4a3820;
        margin-bottom: 28px;
      }

      /* ---- CHARACTER HEADER ---- */
      .char-header {
        display: flex;
        gap: 28px;
        align-items: flex-start;
        margin-bottom: 32px;
        flex-wrap: wrap;
      }

      .char-portrait {
        width: 110px;
        height: 110px;
        border-radius: 4px;
        border: 1px solid #3a2e1c;
        object-fit: cover;
        flex-shrink: 0;
        background: #120f0a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        color: #3a2e1c;
      }

      .char-portrait img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 3px;
      }

      .char-identity {
        flex: 1;
      }

      .char-name {
        font-family: "Cinzel", serif;
        font-size: 32px;
        font-weight: 700;
        color: #d4a840;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-shadow: 0 0 30px rgba(212, 168, 64, 0.2);
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .char-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .char-badge {
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #8a7040;
        background: #1e1810;
        border: 1px solid #3a2e1c;
        border-radius: 2px;
        padding: 4px 10px;
      }

      .char-badge.level {
        color: #c9a45a;
        border-color: #c9a45a44;
        background: #221a08;
      }

      .char-updated {
        font-family: "Crimson Pro", serif;
        font-style: italic;
        font-size: 13px;
        color: #4a3820;
      }

      /* ---- ABILITY SCORES ---- */
      .ability-grid-sheet {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
        margin-bottom: 4px;
      }

      .ability-box {
        background: #120f0a;
        border: 1px solid #3a2e1c;
        border-radius: 4px;
        padding: 14px 8px 10px;
        text-align: center;
      }

      .ability-box .ab-label {
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 2px;
        color: #c9a45a;
        display: block;
        margin-bottom: 6px;
      }

      .ability-box .ab-score {
        font-family: "Cinzel", serif;
        font-size: 26px;
        font-weight: 700;
        color: #e8dcc8;
        display: block;
        line-height: 1;
      }

      .ability-box .ab-mod {
        font-family: "Crimson Pro", serif;
        font-style: italic;
        font-size: 13px;
        color: #7a6a50;
        display: block;
        margin-top: 4px;
      }

      /* ---- SKILLS ---- */
      .skills-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .skill-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        background: #120f0a;
        border-radius: 3px;
        border: 1px solid #2a2010;
      }

      .skill-name {
        font-family: "Crimson Pro", serif;
        font-size: 14px;
        color: #c8b890;
      }

      .skill-name .skill-attr {
        font-size: 11px;
        color: #5a4a30;
        margin-left: 4px;
        font-style: italic;
      }

      .skill-mod {
        font-family: "Cinzel", serif;
        font-size: 13px;
        font-weight: 600;
        color: #c9a45a;
      }

      /* ---- COMBAT STATS ---- */
      .combat-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .combat-box {
        background: #120f0a;
        border: 1px solid #3a2e1c;
        border-radius: 4px;
        padding: 16px 12px;
        text-align: center;
      }

      .combat-label {
        font-family: "Cinzel", serif;
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #5a4a30;
        display: block;
        margin-bottom: 8px;
      }

      .combat-value {
        font-family: "Cinzel", serif;
        font-size: 28px;
        font-weight: 700;
        color: #d4a840;
        display: block;
        line-height: 1;
      }

      /* ---- NOTES ---- */
      .notes-box {
        background: #120f0a;
        border: 1px solid #3a2e1c;
        border-radius: 4px;
        padding: 18px;
        font-family: "Crimson Pro", serif;
        font-size: 16px;
        color: #c8b890;
        line-height: 1.7;
        min-height: 100px;
        white-space: pre-wrap;
      }

      .notes-empty {
        font-style: italic;
        color: #3a2e1c;
      }

      /* ---- DEATH SAVES ---- */
      .death-saves {
        display: flex;
        gap: 20px;
        align-items: center;
        flex-wrap: wrap;
      }

      .death-label {
        font-family: "Cinzel", serif;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #5a4a30;
        min-width: 60px;
      }

      .save-dots {
        display: flex;
        gap: 8px;
      }

      .save-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 1px solid #3a2e1c;
        background: #120f0a;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s;
      }

      .save-dot.success.filled {
        background: #3a7a3a;
        border-color: #5aaa5a;
      }
      .save-dot.failure.filled {
        background: #7a2020;
        border-color: #aa4040;
      }

      /* ---- EDIT BUTTON ---- */
      .sheet-actions {
        display: flex;
        gap: 10px;
        margin-top: 28px;
      }

      /* ---- RESPONSIVE ---- */
      @media (max-width: 650px) {
        .ability-grid-sheet {
          grid-template-columns: repeat(3, 1fr);
        }
        .combat-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .skills-grid {
          grid-template-columns: 1fr;
        }
        .char-name {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="dnd-nav">
      <div class="dnd-logo">⚔ D&D Sheet Hub</div>
      <div class="dnd-nav-links">
        <a href="index.html">Home</a>
        <a href="create.html">Create</a>
        <a href="character.html" class="active">Sheet</a>
        <a href="party.html">Party</a>
      </div>
    </nav>

    <div class="dnd-container">
      <div class="dnd-header">
        <h1 class="dnd-title">Character Sheet</h1>
        <p class="dnd-subtitle">Your hero's legend, inscribed in full</p>
      </div>

      <div class="dnd-panel" id="sheetPanel">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <!-- Filled by JS -->
        <div id="sheetContent"></div>
      </div>
    </div>

    <script>
      const abilities = [
        {
          id: "str",
          label: "STR",
          name: "Strength",
          skills: [{ name: "Athletics", attr: "STR" }],
        },
        {
          id: "dex",
          label: "DEX",
          name: "Dexterity",
          skills: [
            { name: "Acrobatics", attr: "DEX" },
            { name: "Sleight of Hand", attr: "DEX" },
            { name: "Stealth", attr: "DEX" },
          ],
        },
        { id: "con", label: "CON", name: "Constitution", skills: [] },
        {
          id: "int",
          label: "INT",
          name: "Intelligence",
          skills: [
            { name: "Arcana", attr: "INT" },
            { name: "History", attr: "INT" },
            { name: "Investigation", attr: "INT" },
            { name: "Nature", attr: "INT" },
            { name: "Religion", attr: "INT" },
          ],
        },
        {
          id: "wis",
          label: "WIS",
          name: "Wisdom",
          skills: [
            { name: "Animal Handling", attr: "WIS" },
            { name: "Insight", attr: "WIS" },
            { name: "Medicine", attr: "WIS" },
            { name: "Perception", attr: "WIS" },
            { name: "Survival", attr: "WIS" },
          ],
        },
        {
          id: "cha",
          label: "CHA",
          name: "Charisma",
          skills: [
            { name: "Deception", attr: "CHA" },
            { name: "Intimidation", attr: "CHA" },
            { name: "Performance", attr: "CHA" },
            { name: "Persuasion", attr: "CHA" },
          ],
        },
      ];

      function mod(score) {
        return Math.floor((score - 10) / 2);
      }

      function modStr(score) {
        const m = mod(score);
        return (m >= 0 ? "+" : "") + m;
      }

      function profBonus(level) {
        return Math.ceil(level / 4) + 1;
      }

      function calcAC(dex) {
        return 10 + mod(dex);
      }

      function calcHP(level, con) {
        return 8 + mod(con) * level + 8 * (level - 1);
      }

      function calcInitiative(dex) {
        return mod(dex);
      }

      function renderSheet(char) {
        const prof = profBonus(char.level);
        const allSkills = abilities
          .flatMap((a) =>
            a.skills.map((s) => ({
              ...s,
              modVal: mod(char.stats[a.id]),
            })),
          )
          .sort((a, b) => a.name.localeCompare(b.name));

        const updatedDate = new Date(char.updatedAt).toLocaleDateString(
          "no-NO",
          {
            day: "numeric",
            month: "long",
            year: "numeric",
          },
        );

        const portraitHTML = char.image
          ? `<div class="char-portrait"><img src="${char.image}" alt="Character portrait" /></div>`
          : `<div class="char-portrait">⚔</div>`;

        document.getElementById("sheetContent").innerHTML = `
          <!-- HEADER -->
          <div class="char-header">
            ${portraitHTML}
            <div class="char-identity">
              <div class="char-name">${char.name}</div>
              <div class="char-meta">
                <span class="char-badge level">Level ${char.level}</span>
                ${char.class ? `<span class="char-badge">${char.class}</span>` : ""}
                ${char.race ? `<span class="char-badge">${char.race}</span>` : ""}
                ${char.background ? `<span class="char-badge">${char.background}</span>` : ""}
                <span class="char-badge">Prof +${prof}</span>
              </div>
              <div class="char-updated">Last updated: ${updatedDate}</div>
            </div>
          </div>

          <!-- ABILITY SCORES -->
          <div class="section-divider"><span>Ability Scores</span></div>
          <div class="ability-grid-sheet">
            ${abilities
              .map(
                (a) => `
              <div class="ability-box">
                <span class="ab-label">${a.label}</span>
                <span class="ab-score">${char.stats[a.id]}</span>
                <span class="ab-mod">${modStr(char.stats[a.id])}</span>
              </div>
            `,
              )
              .join("")}
          </div>

          <!-- COMBAT STATS -->
          <div class="section-divider" style="margin-top:28px"><span>Combat</span></div>
          <div class="combat-grid">
            <div class="combat-box">
              <span class="combat-label">Hit Points</span>
              <span class="combat-value">${calcHP(char.level, char.stats.con)}</span>
            </div>
            <div class="combat-box">
              <span class="combat-label">Armor Class</span>
              <span class="combat-value">${calcAC(char.stats.dex)}</span>
            </div>
            <div class="combat-box">
              <span class="combat-label">Initiative</span>
              <span class="combat-value">${calcInitiative(char.stats.dex) >= 0 ? "+" : ""}${calcInitiative(char.stats.dex)}</span>
            </div>
          </div>

          <!-- DEATH SAVES -->
          <div style="margin-top:14px; background:#120f0a; border:1px solid #3a2e1c; border-radius:4px; padding:14px 18px;">
            <div style="font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#5a4a30; margin-bottom:12px;">Death Saving Throws</div>
            <div class="death-saves">
              <span class="death-label">Successes</span>
              <div class="save-dots" id="successDots">
                <div class="save-dot success" data-index="0"></div>
                <div class="save-dot success" data-index="1"></div>
                <div class="save-dot success" data-index="2"></div>
              </div>
              <span class="death-label" style="margin-left:12px">Failures</span>
              <div class="save-dots" id="failureDots">
                <div class="save-dot failure" data-index="0"></div>
                <div class="save-dot failure" data-index="1"></div>
                <div class="save-dot failure" data-index="2"></div>
              </div>
            </div>
          </div>

          <!-- SKILLS -->
          <div class="section-divider" style="margin-top:28px"><span>Skills</span></div>
          <div class="skills-grid">
            ${allSkills
              .map(
                (s) => `
              <div class="skill-row">
                <span class="skill-name">${s.name} <span class="skill-attr">${s.attr}</span></span>
                <span class="skill-mod">${s.modVal >= 0 ? "+" : ""}${s.modVal}</span>
              </div>
            `,
              )
              .join("")}
          </div>

          <!-- SAVING THROWS -->
          <div class="section-divider" style="margin-top:28px"><span>Saving Throws</span></div>
          <div class="skills-grid">
            ${abilities
              .map(
                (a) => `
              <div class="skill-row">
                <span class="skill-name">${a.name}</span>
                <span class="skill-mod">${modStr(char.stats[a.id])}</span>
              </div>
            `,
              )
              .join("")}
          </div>

          <!-- NOTES -->
          <div class="section-divider" style="margin-top:28px"><span>Notes & Backstory</span></div>
          <div class="notes-box">
            ${
              char.notes
                ? char.notes.replace(/</g, "&lt;").replace(/>/g, "&gt;")
                : '<span class="notes-empty">No notes recorded.</span>'
            }
          </div>

          <!-- ACTIONS -->
          <div class="sheet-actions">
            <a href="create.html" class="btn-secondary" style="text-decoration:none; padding:14px 22px; font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#7a6a50; border:1px solid #3a2e1c; border-radius:3px; transition:color 0.2s, border-color 0.2s; cursor:pointer; display:inline-block;">✎ Edit Character</a>
            <button class="btn-secondary" id="deleteBtn" style="cursor:pointer;">⊗ Delete Character</button>
          </div>
        `;

        // Death save dot toggle
        document.querySelectorAll(".save-dot").forEach((dot) => {
          dot.addEventListener("click", () => {
            dot.classList.toggle("filled");
          });
        });

        // Delete character
        document.getElementById("deleteBtn").addEventListener("click", () => {
          if (
            confirm(
              "Are you sure you want to delete this character? This cannot be undone.",
            )
          ) {
            localStorage.removeItem("dnd_character");
            renderEmpty();
          }
        });
      }

      function renderEmpty() {
        document.getElementById("sheetContent").innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">📜</span>
            <div class="empty-title">No Character Found</div>
            <p class="empty-desc">Your scroll is blank. Forge a hero first.</p>
            <a href="create.html" class="btn-hero-primary" style="
              background: linear-gradient(135deg, #c9a45a, #a07830);
              color: #0f0c08;
              border: none;
              font-family: 'Cinzel', serif;
              font-size: 13px;
              font-weight: 700;
              letter-spacing: 3px;
              text-transform: uppercase;
              padding: 14px 32px;
              border-radius: 3px;
              cursor: pointer;
              text-decoration: none;
              display: inline-block;
            ">⚔ Create Character</a>
          </div>
        `;
      }

      // Load from localStorage
      const saved = localStorage.getItem("dnd_character");
      if (saved) {
        try {
          renderSheet(JSON.parse(saved));
        } catch {
          renderEmpty();
        }
      } else {
        renderEmpty();
      }
    </script>
  </body>
</html>
